<!doctype html>
<title>Login</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 22rem; margin: 4rem auto; }
  label { display: block; margin: 0.75rem 0 0.25rem; }
  input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
  button { margin-top: 1rem; padding: 0.5rem 1rem; }
  .error { color: #b00020; margin-top: 1rem; }
  .hint { color: #666; font-size: 0.85rem; margin-top: 2rem; }
</style>

<h1>Sign in</h1>

<form method="post" action="{{ url_for('login') }}">
  <!-- Feature 7: CSRF token, bound to this session. Required on every POST. -->
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label for="email">Email</label>
  <input id="email" name="email" type="email" autofocus required>

  <label for="password">Password</label>
  <input id="password" name="password" type="password" required>

  <button type="submit">Log in</button>
</form>

{% if error %}
  <p class="error">{{ error }}</p>
{% endif %}

<p class="hint">
  Test accounts (from seed.py):<br>
  alice@example.com / correct-horse-battery-staple<br>
  bob@example.com / hunter2
</p>
