<!doctype html>
<title>Change password</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 24rem; margin: 4rem auto; }
  label { display: block; margin: 0.75rem 0 0.25rem; }
  input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
  button { margin-top: 1rem; padding: 0.5rem 1rem; }
  .error { color: #b00020; margin-top: 1rem; }
  .ok { color: #0a7d33; margin-top: 1rem; }
  .hint { color: #666; font-size: 0.85rem; margin-top: 1.5rem; }
  a { color: #0057d8; }
</style>

<h1>Change password</h1>

<form method="post" action="{{ url_for('change_password') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <label for="current_password">Current password</label>
  <input id="current_password" name="current_password" type="password" required>

  <label for="new_password">New password</label>
  <input id="new_password" name="new_password" type="password" required>

  <button type="submit">Update password</button>
</form>

{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% if ok %}<p class="ok">{{ ok }}</p>{% endif %}

<p class="hint">
  Policy: at least 12 characters and not a common/breached password.<br>
  Changing it logs out every other session.
</p>

<p><a href="{{ url_for('dashboard') }}">&larr; Back to dashboard</a></p>
