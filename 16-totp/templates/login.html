<!doctype html>
<title>Sign in</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 22rem; margin: 4rem auto; }
  label { display:block; margin:.75rem 0 .25rem; }
  input { width:100%; padding:.5rem; box-sizing:border-box; }
  button { margin-top:1rem; padding:.5rem 1rem; }
  .error { color:#b00020; margin-top:1rem; }
  .hint { color:#666; font-size:.85rem; margin-top:2rem; }
</style>

<h1>Sign in</h1>
<p>Step 1 of 2: password.</p>
<form method="post" action="{{ url_for('login') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="email">Email</label>
  <input id="email" name="email" type="email" autofocus required>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" required>
  <button type="submit">Continue</button>
</form>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<p class="hint">Demo user (from seed.py):<br>user@example.com / correct-horse-battery-staple</p>
